name: PatternSpike

options:
  minimumXcodeGenVersion: 2.46.0
  createIntermediateGroups: true

packages:
  PatternModules:
    path: ..

settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    HEADER_SEARCH_PATHS: "$(SRCROOT)/../Sources/CShaderTypes/include"
    MTL_HEADER_SEARCH_PATHS: "$(SRCROOT)/../Sources/CShaderTypes/include"

targets:
  PatternSpikeMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PatternSpike
        excludes:
          - PatternSpikeMac-Info.plist
          - PatternSpikePad-Info.plist
      - path: ../Sources/MetalRenderer/Shaders.metal
        buildPhase: sources
    dependencies:
      - package: PatternModules
        product: PatternEngine
      - package: PatternModules
        product: EditorCore
      - package: PatternModules
        product: MetalRenderer
      - package: PatternModules
        product: PatternFile
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        PRODUCT_NAME: PatternSpike
        PRODUCT_BUNDLE_IDENTIFIER: com.anubhav.patternspike
        INFOPLIST_KEY_CFBundleDisplayName: Pattern
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    info:
      path: PatternSpike/PatternSpikeMac-Info.plist
      properties:
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.anubhav.pattern-project
            UTTypeDescription: Pattern Project
            UTTypeConformsTo:
              - public.zip-archive
            UTTypeTagSpecification:
              public.filename-extension:
                - patternproj
              public.mime-type:
                - application/x-pattern-project
        CFBundleDocumentTypes:
          - CFBundleTypeName: Pattern Project
            LSItemContentTypes:
              - com.anubhav.pattern-project
            CFBundleTypeRole: Editor

  PatternSpikePad:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PatternSpike
        excludes:
          - PatternSpikeMac-Info.plist
          - PatternSpikePad-Info.plist
      - path: ../Sources/MetalRenderer/Shaders.metal
        buildPhase: sources
    dependencies:
      - package: PatternModules
        product: PatternEngine
      - package: PatternModules
        product: EditorCore
      - package: PatternModules
        product: MetalRenderer
      - package: PatternModules
        product: PatternFile
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        PRODUCT_NAME: PatternSpikePad
        PRODUCT_BUNDLE_IDENTIFIER: com.anubhav.patternspike.pad
        INFOPLIST_KEY_CFBundleDisplayName: Pattern
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        TARGETED_DEVICE_FAMILY: 2
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    info:
      path: PatternSpike/PatternSpikePad-Info.plist
      properties:
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.anubhav.pattern-project
            UTTypeDescription: Pattern Project
            UTTypeConformsTo:
              - public.zip-archive
            UTTypeTagSpecification:
              public.filename-extension:
                - patternproj
              public.mime-type:
                - application/x-pattern-project
        CFBundleDocumentTypes:
          - CFBundleTypeName: Pattern Project
            LSItemContentTypes:
              - com.anubhav.pattern-project
            CFBundleTypeRole: Editor

  PatternSpikeMacUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
    dependencies:
      - target: PatternSpikeMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.anubhav.patternspike.uitests

schemes:
  PatternSpikeMac:
    build:
      targets:
        PatternSpikeMac: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PatternSpikeMacUITests

  PatternSpikePad:
    build:
      targets:
        PatternSpikePad: all
    run:
      config: Debug
